name: Build LaTeX

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'paper/**'  # Adjust this path to match your paper directory
  pull_request:
    paths:
      - 'paper/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: paper  # Adjust to your paper directory
          root_file: unmodelled_search.tex
          latexmk_use_lualatex: false
          latexmk_shell_escape: false
          args: -pdf -pdflatex="pdflatex -interaction=nonstopmode"

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: unmodelled_search
          path: paper/unmodelled_search.pdf
